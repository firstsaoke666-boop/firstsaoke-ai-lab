name: Bug report
description: Report reproducible incorrect behavior.
title: "fix: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, uv version, and relevant package versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Add sanitized logs or tracebacks. Remove credentials and private data.
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched for an existing issue describing this problem.
          required: true
        - label: I removed secrets and private information from this report.
          required: true
        - label: I can reproduce this issue on the current default branch.
          required: true
